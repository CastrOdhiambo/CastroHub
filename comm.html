<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>P2P Video Conference - No Servers, Just You</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Room Controls */
        .room-controls {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .room-info {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            font-family: monospace;
        }

        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }

        button:hover {
            background: #5a67d8;
            transform: translateY(-1px);
        }

        button.danger {
            background: #e53e3e;
        }

        button.danger:hover {
            background: #c53030;
        }

        button.success {
            background: #48bb78;
        }

        /* Video Grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .video-container {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16/9;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }

        .audio-indicator {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #48bb78;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Controls Bar */
        .controls {
            background: white;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .recording-status {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #e53e3e;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            display: none;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: 1fr;
            }
            
            button {
                padding: 8px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="room-controls">
            <div class="room-info">
                <input type="text" id="roomId" placeholder="Room ID (share this link)" readonly>
                <button onclick="createRoom()">Create New Room</button>
                <button onclick="copyRoomLink()">Copy Link</button>
                <button onclick="leaveRoom()" class="danger">Leave Room</button>
            </div>
        </div>

        <div class="video-grid" id="videoGrid"></div>

        <div class="controls">
            <button onclick="toggleAudio()" id="audioBtn">🔊 Mute Audio</button>
            <button onclick="toggleVideo()" id="videoBtn">📹 Stop Video</button>
            <button onclick="toggleScreenShare()" id="screenBtn">🖥️ Share Screen</button>
            <button onclick="toggleVirtualBg()" id="bgBtn">🎨 Virtual BG</button>
            <button onclick="startRecording()" id="recordBtn">⏺️ Record</button>
        </div>
    </div>

    <div class="recording-status" id="recordingStatus">🔴 Recording...</div>

    <!-- TensorFlow.js and BodyPix for virtual background -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix@2.2.0/dist/body-pix.min.js"></script>

    <script>
        // Global state
        let localStream = null;
        let peers = new Map(); // peerId -> { connection, stream, videoElement }
        let peerConnections = new Map();
        let roomId = null;
        let screenStream = null;
        let isSharingScreen = false;
        let virtualBgEnabled = false;
        let bodyPixModel = null;
        let animationFrame = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;

        // Get URL parameters for room ID
        const urlParams = new URLSearchParams(window.location.search);
        const urlRoomId = urlParams.get('room');

        // Initialize
        async function init() {
            if (urlRoomId) {
                roomId = urlRoomId;
                document.getElementById('roomId').value = roomId;
                await joinRoom();
            } else {
                await createRoom();
            }
            
            // Load BodyPix for virtual background
            bodyPixModel = await bodyPix.load({
                architecture: 'MobileNetV1',
                outputStride: 16,
                multiplier: 0.75,
                quantBytes: 2
            });
        }

        // Create a new room
        async function createRoom() {
            roomId = generateRoomId();
            document.getElementById('roomId').value = roomId;
            
            // Update URL without reloading
            const url = new URL(window.location);
            url.searchParams.set('room', roomId);
            window.history.pushState({}, '', url);
            
            await joinRoom();
        }

        // Generate random room ID
        function generateRoomId() {
            return Math.random().toString(36).substring(2, 10);
        }

        // Copy room link
        function copyRoomLink() {
            const link = `${window.location.origin}${window.location.pathname}?room=${roomId}`;
            navigator.clipboard.writeText(link);
            alert('Link copied! Share with others to join the call.');
        }

        // Join a room
        async function joinRoom() {
            try {
                // Get local media
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: true, 
                    audio: true 
                });
                
                // Add local video
                addVideoStream('You', localStream, true);
                
                // Setup peer connection handlers
                setupPeerHandlers();
                
                // Listen for peer connections (via storage event for signaling)
                setupSignaling();
                
                // Broadcast presence
                broadcastPresence();
                
            } catch (error) {
                console.error('Error joining room:', error);
                alert('Could not access camera/microphone. Please check permissions.');
            }
        }

        // Add video stream to grid
        function addVideoStream(name, stream, isLocal = false) {
            const grid = document.getElementById('videoGrid');
            const container = document.createElement('div');
            container.className = 'video-container';
            container.id = isLocal ? 'localVideo' : `video_${Date.now()}`;
            
            const video = document.createElement('video');
            video.srcObject = stream;
            video.autoplay = true;
            video.playsInline = true;
            
            if (!isLocal) {
                video.muted = false;
            } else {
                video.muted = true; // Mute local video to prevent echo
            }
            
            const label = document.createElement('div');
            label.className = 'video-label';
            label.textContent = name;
            
            const audioIndicator = document.createElement('div');
            audioIndicator.className = 'audio-indicator';
            
            container.appendChild(video);
            container.appendChild(label);
            container.appendChild(audioIndicator);
            grid.appendChild(container);
            
            // Store reference
            if (!isLocal) {
                peers.set(container.id, { stream, videoElement: video });
            }
            
            // Start playing
            video.play().catch(e => console.log('Play failed:', e));
            
            return container;
        }

        // Setup signaling using localStorage (works across tabs/windows on same device)
        // For true P2P across devices, you'd need WebRTC data channels or a simple signaling server
        // This demo uses localStorage for same-device testing, but the WebRTC connections work across any network
        function setupSignaling() {
            window.addEventListener('storage', (e) => {
                if (e.key === `p2p_${roomId}`) {
                    const data = JSON.parse(e.newValue);
                    if (data.type === 'offer' && data.peerId !== getPeerId()) {
                        handleOffer(data);
                    } else if (data.type === 'answer' && data.peerId !== getPeerId()) {
                        handleAnswer(data);
                    } else if (data.type === 'ice-candidate' && data.peerId !== getPeerId()) {
                        handleIceCandidate(data);
                    }
                }
            });
        }

        function getPeerId() {
            let id = localStorage.getItem('peerId');
            if (!id) {
                id = Math.random().toString(36).substring(2);
                localStorage.setItem('peerId', id);
            }
            return id;
        }

        function broadcastPresence() {
            // Broadcast that we're here
            const event = {
                type: 'presence',
                peerId: getPeerId(),
                timestamp: Date.now()
            };
            localStorage.setItem(`p2p_${roomId}`, JSON.stringify(event));
        }

        function setupPeerHandlers() {
            // This is where you'd initiate WebRTC connections to new peers
            // For a full implementation, you'd need to:
            // 1. Discover peers via signaling
            // 2. Create RTCPeerConnection for each peer
            // 3. Exchange SDP offers/answers
            // 4. Add tracks to connections
        }

        function handleOffer(data) {
            // Handle WebRTC offer
            console.log('Received offer from:', data.peerId);
        }

        function handleAnswer(data) {
            console.log('Received answer from:', data.peerId);
        }

        function handleIceCandidate(data) {
            console.log('Received ICE candidate from:', data.peerId);
        }

        // Toggle audio
        function toggleAudio() {
            if (localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                audioTrack.enabled = !audioTrack.enabled;
                const btn = document.getElementById('audioBtn');
                btn.textContent = audioTrack.enabled ? '🔊 Mute Audio' : '🔇 Unmute Audio';
            }
        }

        // Toggle video
        function toggleVideo() {
            if (localStream) {
                const videoTrack = localStream.getVideoTracks()[0];
                videoTrack.enabled = !videoTrack.enabled;
                const btn = document.getElementById('videoBtn');
                btn.textContent = videoTrack.enabled ? '📹 Stop Video' : '📹 Start Video';
            }
        }

        // Screen sharing
        async function toggleScreenShare() {
            if (!isSharingScreen) {
                try {
                    screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                    const videoTrack = screenStream.getVideoTracks()[0];
                    const sender = peerConnections.get('local')?.getSenders().find(s => s.track?.kind === 'video');
                    if (sender) {
                        sender.replaceTrack(videoTrack);
                    }
                    
                    // Update local video display
                    const localVideo = document.querySelector('#localVideo video');
                    if (localVideo) {
                        localVideo.srcObject = screenStream;
                    }
                    
                    videoTrack.onended = () => {
                        toggleScreenShare();
                    };
                    
                    isSharingScreen = true;
                    document.getElementById('screenBtn').textContent = '🖥️ Stop Sharing';
                } catch (error) {
                    console.error('Error sharing screen:', error);
                }
            } else {
                // Stop sharing
                const videoTrack = localStream.getVideoTracks()[0];
                const sender = peerConnections.get('local')?.getSenders().find(s => s.track?.kind === 'video');
                if (sender) {
                    sender.replaceTrack(videoTrack);
                }
                
                const localVideo = document.querySelector('#localVideo video');
                if (localVideo) {
                    localVideo.srcObject = localStream;
                }
                
                screenStream?.getTracks().forEach(track => track.stop());
                isSharingScreen = false;
                document.getElementById('screenBtn').textContent = '🖥️ Share Screen';
            }
        }

        // Virtual background using TensorFlow.js
        async function toggleVirtualBg() {
            if (!virtualBgEnabled) {
                virtualBgEnabled = true;
                document.getElementById('bgBtn').textContent = '🎨 BG On';
                applyVirtualBackground();
            } else {
                virtualBgEnabled = false;
                document.getElementById('bgBtn').textContent = '🎨 Virtual BG';
                if (animationFrame) {
                    cancelAnimationFrame(animationFrame);
                }
                // Restore original video
                const localVideo = document.querySelector('#localVideo video');
                if (localVideo && localStream) {
                    localVideo.srcObject = localStream;
                }
            }
        }

        async function applyVirtualBackground() {
            const video = document.querySelector('#localVideo video');
            if (!video || !virtualBgEnabled) return;
            
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            
            async function processFrame() {
                if (!virtualBgEnabled || !video.videoWidth) {
                    animationFrame = requestAnimationFrame(processFrame);
                    return;
                }
                
                try {
                    // Segment person from video
                    const segmentation = await bodyPixModel.segmentPerson(video, {
                        flipHorizontal: false,
                        internalResolution: 'medium',
                        segmentationThreshold: 0.7
                    });
                    
                    // Draw original video
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // Get image data
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    
                    // Apply background replacement
                    for (let i = 0; i < data.length; i += 4) {
                        const x = (i / 4) % canvas.width;
                        const y = Math.floor((i / 4) / canvas.width);
                        const isPerson = segmentation.data[y * canvas.width + x] === 1;
                        
                        if (!isPerson) {
                            // Replace background with gradient
                            const gradient = (x / canvas.width) * 255;
                            data[i] = 100 + gradient;     // R
                            data[i+1] = 150 + gradient;   // G
                            data[i+2] = 200 + gradient;   // B
                        }
                    }
                    
                    ctx.putImageData(imageData, 0, 0);
                    
                    // Update video stream
                    const stream = canvas.captureStream(30);
                    const localVideoElement = document.querySelector('#localVideo video');
                    if (localVideoElement) {
                        localVideoElement.srcObject = stream;
                    }
                    
                } catch (error) {
                    console.error('Virtual background error:', error);
                }
                
                animationFrame = requestAnimationFrame(processFrame);
            }
            
            processFrame();
        }

        // Recording functionality
        async function startRecording() {
            if (!isRecording && localStream) {
                recordedChunks = [];
                const streamToRecord = new MediaStream();
                
                // Add all tracks from local and remote streams
                localStream.getTracks().forEach(track => streamToRecord.addTrack(track));
                peers.forEach(peer => {
                    peer.stream.getTracks().forEach(track => streamToRecord.addTrack(track));
                });
                
                mediaRecorder = new MediaRecorder(streamToRecord);
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        recordedChunks.push(event.data);
                    }
                };
                
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `recording_${Date.now()}.webm`;
                    a.click();
                    URL.revokeObjectURL(url);
                    
                    isRecording = false;
                    document.getElementById('recordingStatus').style.display = 'none';
                    document.getElementById('recordBtn').textContent = '⏺️ Record';
                };
                
                mediaRecorder.start(1000); // Capture every second
                isRecording = true;
                document.getElementById('recordingStatus').style.display = 'block';
                document.getElementById('recordBtn').textContent = '⏹️ Stop';
                document.getElementById('recordBtn').onclick = stopRecording;
            }
        }
        
        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                mediaRecorder = null;
                document.getElementById('recordBtn').onclick = startRecording;
            }
        }

        // Leave room
        function leaveRoom() {
            // Close all peer connections
            peerConnections.forEach((pc, peerId) => {
                pc.close();
            });
            
            // Stop all tracks
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            if (screenStream) {
                screenStream.getTracks().forEach(track => track.stop());
            }
            
            // Clear video grid
            document.getElementById('videoGrid').innerHTML = '';
            
            // Reset state
            peers.clear();
            peerConnections.clear();
            
            // Clear URL
            window.history.pushState({}, '', window.location.pathname);
            
            // Re-initialize
            roomId = null;
            init();
        }

        // Start the app
        init();
    </script>
</body>
</html>
